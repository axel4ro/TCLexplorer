
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Items Bonus & Upgrade Requirements</title>

<style>
* { box-sizing: border-box; }

html, body { overflow-x: hidden; }

body { font-family: Arial; background:#111; color:#eee; padding:20px; margin:0; }
select { width:100%; padding:6px; margin:4px 0 }

.wiki-item { background:#f3e8c9; color:#000; margin-bottom:30px; border:2px solid #6b0000; overflow:hidden }
.wiki-header { background:#6b0000; color:#fff; padding:6px 10px; font-weight:bold }
.wiki-body { padding:10px }
table {
  border-collapse: collapse;
  margin-top: 10px;
  width: 100%;
}

th, td { border:1px solid #555; padding:6px; text-align:center }
th { background:#3b2b6b; color:#fff }
.table-wrap {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.header-buttons {
  display:flex;
  gap:10px;
  margin:10px 0;
}

.header-buttons button {
  flex:1;
  padding:10px;
  background:#249c8c;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.card-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:14px;
  margin:15px 0;
}

.sub-card {
  background:#1e2230;
  border:1px solid #333;
  border-radius:14px;
  padding:16px;
  cursor:pointer;
  color:#2ff6de;
}

.sub-card:hover {
  background:#20263a;
}



.top-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 12px 0 18px 0;
  flex-wrap: nowrap; /* 🔥 CHEIA */
}


.back-btn {
  background: #249c8c;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 0 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;

  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  text-decoration: none;   /* 🔥 scoate underline */
}


.search-wrap {
  display: flex;
  align-items: center;
  flex: 1;
  gap: 8px;
  min-width: 0; /* 🔥 IMPORTANT pentru flex */
}

.search-wrap input {
  flex: 1;
  min-width: 0; /* 🔥 fără overflow */
  padding: 10px;
  border-radius: 8px;
  background: #1e2230;
  border: 1px solid #333;
  color: #fff;
  font-size: 15px;
  height: 40px;
}

.search-wrap button {
  padding: 0 14px;
  background: linear-gradient(180deg, #2aa997, #249c8c);
  color: #fff;
  border: 1px solid #2a2f42;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  white-space: nowrap;

  height: 40px;
  flex-shrink: 0; /* 🔥 NU se micșorează / nu urcă */
  box-shadow: none;
}

.wiki-container {
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

.desktop-scale-shell {
  width: 100%;
}

/* Ascunde coloana +0 */
table th:nth-child(2),
table td:nth-child(2) {
  display: none;
}

.item-group{
padding:15px;
background:#f3e8c9;
border:none;
}

.plus-grid{
display:grid;
grid-template-columns:repeat(5,minmax(0,1fr));
gap:10px;
margin-top:15px;
}

.item-card{
background:#3b2b6b;
border:1px solid #9b8d6a;
padding:12px;
text-align:center;
color:#FFFFFF;
min-width:0;
}

.item-title{
color:#ffcc00;
font-weight:bold;
}

.stat{
color:#6df0c2;
font-size:13px;
}

@media (max-width: 768px) {
  body {
    padding: 0;
  }

  .desktop-scale-shell {
    position: relative;
    width: 100%;
    overflow: hidden;
  }

  .wiki-container {
    position: absolute;
    top: 0;
    left: 50%;
    width: 1280px;
    max-width: none;
    margin: 0;
    transform-origin: top center;
  }
}

</style>
</head>

<body>
<div class="desktop-scale-shell" id="desktopScaleShell">
<div class="wiki-container" id="desktopScaleRoot">
<h1>Item Upgrade Requirements & Bonuses preview </h1>

<div class="top-bar">
  <a href="wiki.html" class="back-btn" onclick="return goBackToWiki(event)">⬅️ Back to WiKi</a>
  <div class="search-wrap">
    <input id="searchInput"
       placeholder="Search by item name..."
       oninput="handleSearchInput(this)"
       style="width:100%;padding:10px;margin:12px 0;font-size:16px">
    <button onclick="applySearch()">Search</button>
  </div>
</div>

<div class="header-buttons">
  <button onclick="openCategory('Armors')">Armors</button>
  <button onclick="openCategory('Weapons')">Weapons</button>
  <button onclick="openCategory('Accessories')">Accessories</button>
</div>


<div id="subCards"></div>
<div id="wiki"></div>
</div>
</div>


<script>
const DESKTOP_SCALE_WIDTH = 1280;

function goBackToWiki(event) {
  if (event) event.preventDefault();
  if (window.parent && window.parent !== window) {
    try {
      window.parent.postMessage({ type: "tcl:navigate", page: "wiki" }, "*");
      return false;
    } catch (err) {
      console.warn("Back to Wiki parent navigation failed:", err);
    }
  }
  window.location.href = "wiki.html";
  return false;
}

function applyDesktopPortraitScale() {
  const shell = document.getElementById("desktopScaleShell");
  const root = document.getElementById("desktopScaleRoot");

  if (!shell || !root) return;

  if (window.innerWidth > 768) {
    shell.style.height = "";
    root.style.position = "";
    root.style.left = "";
    root.style.width = "";
    root.style.transform = "";
    return;
  }

  const availableWidth = Math.max(window.innerWidth - 12, 320);
  const scale = Math.min(1, availableWidth / DESKTOP_SCALE_WIDTH);
  const scaledHeight = root.scrollHeight * scale;

  root.style.position = "absolute";
  root.style.left = "50%";
  root.style.width = DESKTOP_SCALE_WIDTH + "px";
  root.style.transform = `translateX(-50%) scale(${scale})`;
  shell.style.height = Math.ceil(scaledHeight) + "px";
}

function openCategory(cat) {
  activeCategory = cat;
  activeSub = null;

  // 🔥 reset search când schimbăm categoria
  document.getElementById("searchInput").value = "";

  const box = document.getElementById("subCards");
  const wiki = document.getElementById("wiki");

  box.innerHTML = `
    <div class="card-grid">
      ${(subCategories[cat] || []).map(s => `
        <div class="sub-card" onclick="openSub('${s}')">
          ${getSubLabel(s)}
        </div>
      `).join("")}
    </div>
  `;

  wiki.innerHTML = "";
  requestAnimationFrame(applyDesktopPortraitScale);
}


function openSub(sub) {
  activeSub = sub;

  // 🔥 reset search când alegem subcategorie
  document.getElementById("searchInput").value = "";

  renderItems();
  requestAnimationFrame(applyDesktopPortraitScale);
}


const subCategories = {
  "Armors": [
    "Armour",
    "Suit",
    "Plate",
    "Clothing"
  ],
  "Weapons": [
    "Sword",
    "Dagger",
    "Bow",
    "Staff",
    "Fan"
  ],
  "Accessories": [
    "Helmet",
    "Shield",
    "Bracelet",
    "Necklace",
    "Earrings",
    "Shoes",
	//"Belt"
  ]
};
const subCategoryRace = {
  "Armour": "Human",
  "Suit": "Beast",
  "Plate": "Undead",
  "Clothing": "Elf"
};
function getSubLabel(name) {
  return subCategoryRace[name]
    ? `${name} (${subCategoryRace[name]})`
    : name;
}


function loadRandomCategoryAndSub() {
  const categories = Object.keys(subCategories);

  // categorie random
  const randomCategory =
    categories[Math.floor(Math.random() * categories.length)];

  const subs = subCategories[randomCategory];
  if (!subs || subs.length === 0) return;

  // subcategorie random
  const randomSub =
    subs[Math.floor(Math.random() * subs.length)];

  // 🔥 exact ca un click real
  openCategory(randomCategory);
  openSub(randomSub);
}

window.addEventListener("DOMContentLoaded", async () => {

await loadItemsData();

loadRandomCategoryAndSub();
applyDesktopPortraitScale();

});
window.addEventListener("resize", applyDesktopPortraitScale);
const funTexts = [
  "Blacksmith’s Random Pick",
  "Today’s Featured Upgrades",
  "Forged by Chance",
  "Random Upgrade Selection"
];

document.querySelector("h1").innerHTML =
  `Items Bonus & Upgrade Requirements
  <br> <span style="opacity:.6;font-size:18px">${funTexts[Math.floor(Math.random() * funTexts.length)]}</span>`;


let items = [];
let bonuses = {};

async function loadItemsData(){

const url = "https://raw.githubusercontent.com/axel4ro/TCLexplorer/main/data/items_data.json";

try{

const res = await fetch(url);
const data = await res.json();

items = data.items || [];
bonuses = data.bonuses || {};

renderItems();
requestAnimationFrame(applyDesktopPortraitScale);

}catch(err){

console.error("JSON load error:", err);

document.getElementById("wiki").innerHTML =
"<p style='color:red'>Failed loading item data.</p>";

}

}

let activeCategory = null;
let activeSub = null;

function applySearch() {
  renderItems();
}
document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") applySearch();
});

function goBack() {
  // reset total
  activeCategory = null;
  activeSub = null;
  document.getElementById("searchInput").value = "";

  document.getElementById("subCards").innerHTML = "";
  document.getElementById("wiki").innerHTML = "";
}
function handleSearchInput(input) {
  // auto-capitalize în timp real
  const cursor = input.selectionStart;
  input.value = capitalizeWords(input.value);
  input.setSelectionRange(cursor, cursor);

  // live search
  renderItems();
}

function safe(v) {
  return (v === undefined || v === null || v === "") ? "-" : v;
}
function renderBonusPreview(item){

if(!bonuses[item.name]) return "";

let cards="";

for(let p=0;p<=9;p++){

let stats="";
const b=bonuses[item.name][p];

if(b){

b.forEach(s=>{

let value=s.min || "";

if(s.random && s.max){
value=s.min+"-"+s.max;
}

if(s.percent){
value=value+"%";
}

let color="#6df0c2";

if(String(value).startsWith("-")){
color="#ff4d4d";
}

stats+=`<div class="stat" style="color:${color}">${s.type} ${value}</div>`;

});

}

let wearable="Human • Beast • Undead • Elf";

if(item.category==="Armors"){

if(item.subCategory==="Armour") wearable="Human";
if(item.subCategory==="Suit") wearable="Beast";
if(item.subCategory==="Plate") wearable="Undead";
if(item.subCategory==="Clothing") wearable="Elf";

}

cards+=`

<div class="item-card">

<div class="item-title">${item.name}+${p}</div>

<div>From level: ${item.level}</div>

${stats}

<div>[Wearable]</div>
<div>${wearable}</div>

</div>

`;

}

return `

<div class="item-group">

<div class="plus-grid">
${cards}
</div>

</div>

`;
}
function capitalizeWords(str) {
  return str
    .toLowerCase()
    .replace(/\b\w/g, char => char.toUpperCase());
}

function renderItems() {
  const wiki = document.getElementById("wiki");
  const q = document.getElementById("searchInput").value.toLowerCase();

  wiki.innerHTML = "";

  // 🔥 DACĂ există search → ignorăm categoria activă
  const useCategoryFilter = q === "";


  items.forEach(it => {
  if (useCategoryFilter) {
  if (activeCategory && it.category !== activeCategory) return;
  if (activeSub && it.subCategory !== activeSub) return;
}


    if (
      q &&
      !it.name.toLowerCase().includes(q) &&
      !String(it.level).includes(q)
    ) return;

    const hasItem2 = it.upgrades.some(u => safe(u.item2) !== "-");

    wiki.innerHTML += `
      <div class="wiki-item">
        <div class="wiki-header" onclick="this.parentElement.classList.toggle('active')">
          Level ${it.level} ${it.name}
        </div>
<div class="wiki-body">
  Socket: ${safe(it.socket)}

  <div class="table-wrap">
    <table>
      <tr>
              <th></th>
              ${it.upgrades.map((_, i) => `<th>+${i}</th>`).join("")}
            </tr>
            <tr>
              <th>Curse</th>
              ${it.upgrades.map(u => `<td>${safe(u.curse)}</td>`).join("")}
            </tr>
            <tr>
              <th>Upgrade Metal</th>
              ${it.upgrades.map(u => `<td>${safe(u.metal)}</td>`).join("")}
            </tr>
            <tr>
              <th>Upgrade Item</th>
              ${it.upgrades.map(u => `<td>${safe(u.item1)}</td>`).join("")}
            </tr>
            ${
              hasItem2
                ? `<tr><th>Upgrade Item 2</th>${it.upgrades
                    .map(u => `<td>${safe(u.item2)}</td>`)
                    .join("")}</tr>`
                : ""
            }
          </table>
        </div>
		${renderBonusPreview(it)}
      </div>
    `;
  });

  requestAnimationFrame(applyDesktopPortraitScale);
}


</script>

</body>
</html>

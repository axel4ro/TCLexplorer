<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Radio ZU Auto Live</title>
</head>
<body style="margin:0;background:#111;color:white;font-family:Arial;text-align:center;padding-top:80px;">

  <h2>📻 Radio ZU LIVE</h2>
  <p id="status">Se încearcă pornirea automată...</p>

  <audio id="radio" controls autoplay playsinline style="width:320px">
    <source src="https://live.radiozu.ro/radiozu" type="audio/mpeg">
  </audio>

  <script>
    const radio = document.getElementById("radio");
    const statusText = document.getElementById("status");

    radio.volume = 1;

    function startRadio() {
      radio.play()
        .then(() => {
          statusText.innerText = "LIVE pornit ✅";
        })
        .catch(() => {
          statusText.innerText = "Browserul blochează autoplay. Apasă oriunde pe pagină.";
        });
    }

    window.addEventListener("load", startRadio);
    document.addEventListener("click", startRadio);
    document.addEventListener("touchstart", startRadio);
  </script>

</body>
</html>

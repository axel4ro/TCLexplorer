name = "tcl-pnl-sync"
main = "worker.js"
compatibility_date = "2026-05-27"
compatibility_flags = ["global_fetch_strictly_public"]
workers_dev = true

[vars]
SUPABASE_URL        = "https://phhzrfzhwwooeqsdztee.supabase.co"
ALLOWED_ORIGIN      = "https://tclexplorer.com,https://axel4ro.github.io"
MVX_API             = "https://api.multiversx.com"
TCL_TOKEN           = "TCL-fe459d"
LISTING_TIMESTAMP   = "1718236800"    # 2024-06-13 00:00:00 UTC
SYNC_BATCH_SIZE     = "50"            # pagini per run de cron (50 * 50 = 2500 entries)
DEBUG_ERRORS        = "false"

[triggers]
crons = ["*/10 * * * *"]              # la fiecare 10 minute

[secrets]
required = [
  "SUPABASE_SERVICE_ROLE_KEY",
  "SYNC_SECRET"
]

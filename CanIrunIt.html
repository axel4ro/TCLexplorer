<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Can I Run It? - The Cursed Land</title>
  <meta name="description" content="Device compatibility test for The Cursed Land minimum requirements." />
  <meta name="theme-color" content="#07100f" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07100f;
      --panel: #10181c;
      --panel-strong: #151c25;
      --line: rgba(109, 226, 210, 0.18);
      --line-strong: rgba(109, 226, 210, 0.34);
      --text: #eef7f5;
      --muted: #a9bbb9;
      --soft: #768985;
      --accent: #2ff6de;
      --accent-strong: #91fff0;
      --gold: #ffca7a;
      --green: #84f5a0;
      --red: #ff9e8f;
      --blue: #8eb8ff;
      --shadow: 0 22px 56px rgba(0, 0, 0, 0.34);
      --radius: 8px;
      --font-display: "Cinzel", serif;
      --font-ui: "Space Grotesk", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: var(--font-ui);
      background:
        linear-gradient(180deg, rgba(18, 31, 35, 0.96), rgba(7, 16, 15, 1) 48%, #070b0d 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 54px 54px;
      opacity: 0.12;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; }

    .page-shell {
      position: relative;
      width: min(980px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 48px;
      z-index: 1;
    }

    .topbar, .checker, .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
      padding: 14px 16px;
      background: rgba(10, 17, 20, 0.84);
    }

    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand img { width: 42px; height: 42px; border-radius: 8px; display: block; }
    .brand-title { display: block; font-family: var(--font-display); color: var(--accent); font-size: 1rem; line-height: 1.1; }
    .brand-sub { display: block; margin-top: 4px; color: var(--muted); font-size: 0.86rem; }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 202, 122, 0.28);
      background: rgba(255, 202, 122, 0.08);
      color: var(--gold);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1, h2, h3 { margin: 0; font-family: var(--font-display); }
    h1 { margin-top: 7px; color: #fff; font-size: clamp(2rem, 4.6vw, 3.3rem); line-height: 1.02; }
    h1 span { color: var(--accent); }

    .checker {
      overflow: hidden;
      background: rgba(12, 20, 24, 0.88);
    }

    .checker-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(47, 246, 222, 0.08), rgba(255, 202, 122, 0.04));
    }

    .scan-copy {
      min-width: 0;
      max-width: 720px;
    }

    .scan-title-line {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .section-label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .checker-head p {
      max-width: 720px;
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.48;
    }

    .actions {
      display: grid;
      gap: 8px;
      width: min(220px, 100%);
      flex: 0 0 auto;
    }

    .button-main, .button-ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 10px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 0.18s, border-color 0.18s, background 0.18s;
      white-space: nowrap;
    }

    .button-main {
      border: 1px solid rgba(47, 246, 222, 0.62);
      color: #031412;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      font-weight: 800;
      box-shadow: 0 12px 26px rgba(47, 246, 222, 0.16);
    }

    .button-ghost {
      border: 1px solid var(--line-strong);
      color: var(--text);
      background: rgba(21, 30, 36, 0.86);
    }

    .button-main:hover, .button-ghost:hover { transform: translateY(-1px); }

    .result-box { padding: 20px; display: grid; gap: 14px; }

    .summary {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(8, 17, 20, 0.7);
    }

    .score-ring {
      width: 106px;
      height: 106px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid rgba(47, 246, 222, 0.3);
      background: radial-gradient(circle, rgba(47, 246, 222, 0.18), rgba(47, 246, 222, 0.04));
      color: var(--accent-strong);
      font-size: 1.8rem;
      font-weight: 900;
    }

    .summary h3 { font-size: 1.45rem; color: #fff; }
    .summary p { margin: 8px 0 0; color: var(--muted); line-height: 1.5; }

    .grid,
    .check-main-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .check-main-grid {
      align-items: start;
    }

    .check-side-stack {
      display: grid;
      gap: 12px;
      align-self: start;
    }

    .check-side-stack .card {
      min-height: 0;
    }

    .card {
      padding: 15px;
      background: rgba(8, 17, 20, 0.7);
      box-shadow: none;
    }

    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .card h3 { font-size: 1rem; color: #fff; }
    .badge { padding: 5px 9px; border-radius: 999px; font-size: 0.78rem; font-weight: 800; border: 1px solid var(--line); color: var(--muted); }
    .pass { color: var(--green); border-color: rgba(132, 245, 160, 0.35); background: rgba(132, 245, 160, 0.08); }
    .fail { color: var(--red); border-color: rgba(255, 158, 143, 0.35); background: rgba(255, 158, 143, 0.08); }
    .warn { color: var(--gold); border-color: rgba(255, 202, 122, 0.35); background: rgba(255, 202, 122, 0.08); }
    .info { color: var(--blue); border-color: rgba(142, 184, 255, 0.35); background: rgba(142, 184, 255, 0.08); }
    .card p { margin: 0; color: var(--muted); line-height: 1.46; font-size: 0.94rem; }
    .value { color: var(--accent-strong); font-weight: 800; }

    .notice {
      padding: 14px 16px;
      border: 1px solid rgba(255, 202, 122, 0.24);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(255, 202, 122, 0.06);
      line-height: 1.5;
    }


    .speed-panel {
      display: grid;
      gap: 16px;
    }

    .speed-main {
      text-align: center;
      padding: 10px 0 4px;
    }

    .speed-title {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .speed-number {
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
      color: #fff;
      font-size: clamp(3.4rem, 12vw, 7.2rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.08em;
    }

    .speed-unit {
      color: var(--text);
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 0;
      margin-bottom: 0.18em;
    }

    .speed-subgrid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      border-top: 1px solid rgba(109,226,210,.16);
      padding-top: 14px;
    }

    .speed-metric {
      min-width: 0;
    }

    .speed-metric strong {
      display: block;
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 6px;
    }

    .speed-metric span {
      display: block;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .speed-metric .metric-value {
      display: inline;
      color: var(--accent-strong);
      font-size: 1.5rem;
      font-weight: 900;
      margin-right: 4px;
    }

    .speed-loading {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--gold);
      font-weight: 800;
    }

    .speed-settings {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(109,226,210,.12);
    }

    .speed-settings small {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 4px;
    }

    .speed-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(109,226,210,.12);
    }

    .speed-actions .button-main,
    .speed-actions .button-ghost {
      min-height: 38px;
      padding: 8px 12px;
      font-size: 0.88rem;
    }

    .speed-loading::before {
      content: "";
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 2px solid rgba(255, 202, 122, 0.25);
      border-top-color: var(--gold);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 760px) {
      .speed-subgrid { grid-template-columns: 1fr; }
    }

    .raw {
      margin: 0;
      padding: 14px;
      overflow: auto;
      max-height: 220px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(0, 0, 0, 0.22);
      font-size: 0.82rem;
      white-space: pre-wrap;
    }

    @media (max-width: 760px) {
      .topbar, .checker-head { align-items: flex-start; flex-direction: column; }
      .button-main, .button-ghost { width: 100%; }
      .actions { width: 100%; }
      .summary { grid-template-columns: 1fr; }
      .grid, .check-main-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page-shell" id="CanIrunIt">
    <header class="topbar">
      <div class="brand">
        <img src="images/tcl_icon.png" alt="">
        <div>
          <span class="brand-title">The Cursed Land</span>
          <span class="brand-sub" data-i18n="brandSub">Device compatibility check</span>
        </div>
      </div>
      <button type="button" class="button-ghost" onclick="goBackToGameRequirements()" data-i18n="backButton">Back</button>
    </header>

    <section class="checker">
      <div class="checker-head">
        <div class="scan-copy">
          <div class="scan-title-line">
            <span class="kicker" data-i18n="scanKicker">System Scan</span>
            <span class="section-label" data-i18n="compatibilityLabel">Compatibility Test</span>
          </div>
          <h1 data-i18n="heroTitle">Can I <span>Run It?</span></h1>
          <p data-i18n="heroDesc">Check if your device meets the minimum requirements for The Cursed Land.</p>
        </div>
        <div class="actions"><button class="button-main" type="button" onclick="runCheck()" data-i18n="runButton">Can I Run It?</button><button id="gpuAccelBtn" class="button-ghost" type="button" onclick="handleGraphicsAccelerationButton(this)" data-i18n="gpuButton">GPU Acceleration</button></div>
      </div>

      <div class="result-box" id="results" data-state="idle">
        <div class="notice" data-i18n="noScanHtml">No scan yet. Press <strong>Can I Run It?</strong> to start.</div>
      </div>
    </section>
  </main>

  <script src="lang/can-i-run-it.bundle.js?v=20260514-1"></script>
  <script>
    const CANIRUN_LANG_STORAGE_KEY = "lang";
    const CANIRUN_SUPPORTED_LANGS = ["en", "ro", "tr", "de", "es", "fr", "it", "pl", "pt"];
    const CANIRUN_TRANSLATIONS = window.TCL_CANIRUN_LANG_DATA || {};
    let currentCanIRunLang = "en";

    function normalizeLang(lang) {
      const raw = String(lang || "").toLowerCase();
      if (CANIRUN_SUPPORTED_LANGS.includes(raw)) return raw;
      const base = raw.split("-")[0];
      return CANIRUN_SUPPORTED_LANGS.includes(base) ? base : "en";
    }

    function getTranslationSet(lang) {
      return CANIRUN_TRANSLATIONS[lang] || CANIRUN_TRANSLATIONS.en || {};
    }

    function tr(key, fallback = "") {
      const data = getTranslationSet(currentCanIRunLang);
      const fallbackData = getTranslationSet("en");
      return data[key] || fallbackData[key] || fallback || key;
    }

    function applyTranslations(lang) {
      const normalizedLang = normalizeLang(lang);
      currentCanIRunLang = normalizedLang;
      const data = getTranslationSet(normalizedLang);
      const fallback = getTranslationSet("en");

      document.documentElement.lang = normalizedLang;
      document.title = data.metaTitle || fallback.metaTitle || document.title;

      const metaDescription = document.querySelector('meta[name="description"]');
      if (metaDescription) {
        metaDescription.setAttribute("content", data.metaDescription || fallback.metaDescription || metaDescription.content);
      }

      document.querySelectorAll("[data-i18n]").forEach((node) => {
        const key = node.getAttribute("data-i18n");
        const value = data[key] || fallback[key];
        if (typeof value === "string") node.innerHTML = value;
      });
    }

    function setCanIRunLang(lang) {
      const normalizedLang = normalizeLang(lang);
      localStorage.setItem(CANIRUN_LANG_STORAGE_KEY, normalizedLang);
      applyTranslations(normalizedLang);
      refreshRenderedResultsLanguage();
    }

    function resolveStartupLang() {
      const params = new URLSearchParams(window.location.search);
      return normalizeLang(params.get("lang") || localStorage.getItem(CANIRUN_LANG_STORAGE_KEY) || navigator.language || "en");
    }

    function refreshRenderedResultsLanguage() {
      const results = document.getElementById("results");
      if (!results) return;

      if (results.dataset.state === "running") {
        results.innerHTML = `<div class="notice">${escapeHtml(tr("scanningDeviceInfo", "Scanning device information..."))}</div>`;
        return;
      }

      if (lastScanContext) {
        renderScanResults(lastScanContext, lastInternetResult, {
          internetPending: isInternetRefreshRunning || lastInternetResult === undefined
        });
      }
    }

    const MINIMUMS = {
      windows: {
        osName: "Windows",
        osText: "Windows 10/11 64-bit",
        minRamGb: 6,
        minStorageGb: 2,
        minDownloadMbps: 50,
        minLatencyMs: 100,
        minGpuText: "2+ GB VRAM",
        gpuRequired: true
      },
      android: {
        osName: "Android",
        osText: "Android 10+",
        minRamGb: 6,
        minStorageGb: 2,
        minDownloadMbps: 50,
        minLatencyMs: 100,
        minAntutu: 500000,
        gpuRequired: false
      },
      ios: {
        osName: "iOS",
        osText: "iOS 15+",
        minRamGb: 3,
        minStorageGb: 2,
        minDownloadMbps: 50,
        minLatencyMs: 100,
        minAntutu: 500000,
        gpuRequired: false
      }
    };

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>'"]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      }[char]));
    }

    function bytesToGb(bytes) {
      if (!Number.isFinite(bytes)) return null;
      return bytes / 1024 / 1024 / 1024;
    }

    function formatGb(value) {
      if (!Number.isFinite(value)) return tr("unknown", "Unknown");
      return `${value.toFixed(value >= 10 ? 0 : 1)} GB`;
    }

    function detectOS() {
      const ua = navigator.userAgent || "";
      const platform = navigator.platform || "";
      const brands = navigator.userAgentData?.brands?.map(b => `${b.brand} ${b.version}`).join(", ") || "";
      const isIOS = /iPad|iPhone|iPod/.test(ua) || (platform === "MacIntel" && navigator.maxTouchPoints > 1);
      const isAndroid = /Android/i.test(ua);
      const isWindows = /Windows/i.test(ua) || /Win/i.test(platform);
      const isMac = /Macintosh|Mac OS X/i.test(ua) && !isIOS;

      let os = "unknown";
      if (isWindows) os = "windows";
      else if (isAndroid) os = "android";
      else if (isIOS) os = "ios";
      else if (isMac) os = "macos";

      return { os, ua, platform, brands };
    }

    async function getHighEntropyUA() {
      if (!navigator.userAgentData?.getHighEntropyValues) return null;
      try {
        return await navigator.userAgentData.getHighEntropyValues([
          "platform",
          "platformVersion",
          "architecture",
          "bitness",
          "model",
          "uaFullVersion"
        ]);
      } catch (error) {
        return null;
      }
    }

    function getWindowsVersionFromUA(ua, highEntropy) {
      const ntMatch = ua.match(/Windows NT\s+([0-9.]+)/i);
      const nt = ntMatch ? ntMatch[1] : "";
      const platformVersion = highEntropy?.platformVersion || "";
      const platformMajor = Number(String(platformVersion).split(".")[0]);

      if (nt === "10.0") {
        if (platformMajor >= 13) return "Windows 11";
        if (platformMajor > 0) return "Windows 10";
        return "Windows 10/11";
      }

      const map = {
        "6.3": "Windows 8.1",
        "6.2": "Windows 8",
        "6.1": "Windows 7",
        "6.0": "Windows Vista",
        "5.2": "Windows XP / Server 2003",
        "5.1": "Windows XP",
        "5.0": "Windows 2000"
      };

      return map[nt] || (nt ? `Windows NT ${nt}` : tr("windowsDetected", "Windows detected"));
    }

    function getSystemBitness(osKey, ua, highEntropy) {
      const bitness = highEntropy?.bitness;
      const architecture = String(highEntropy?.architecture || "").toLowerCase();

      if (bitness === "64") return "64-bit";
      if (bitness === "32") return "32-bit";

      if (architecture.includes("64")) return "64-bit";
      if (architecture.includes("x86") || architecture.includes("arm")) return "32-bit";

      if (osKey === "windows") {
        if (/WOW64|Win64|x64|x86_64|amd64/i.test(ua)) return "64-bit";
        if (/Win32|i686|i386/i.test(ua)) return "32-bit";
      }

      return "";
    }

    function parsePlatformVersionNumber(platformVersion) {
      const parts = String(platformVersion || "")
        .split(".")
        .map(part => Number(part))
        .filter(Number.isFinite);
      if (!parts.length || parts.every(part => part === 0)) return "";
      const [major, minor, patch] = parts;
      if (Number.isFinite(patch) && patch > 0) return `${major}.${minor || 0}.${patch}`;
      if (Number.isFinite(minor) && minor > 0) return `${major}.${minor}`;
      return String(major);
    }

    function getAndroidVersionLabel(ua, highEntropy) {
      const highEntropyPlatform = String(highEntropy?.platform || "").toLowerCase();
      const highEntropyVersion = highEntropyPlatform === "android"
        ? parsePlatformVersionNumber(highEntropy?.platformVersion)
        : "";

      if (highEntropyVersion) return `Android ${highEntropyVersion}`;

      const match = ua.match(/Android\s+([0-9.]+)/i);
      return match ? `Android ${match[1]}` : tr("androidDetected", "Android detected");
    }

    function parseIOSVersion(ua) {
      const osMatch = ua.match(/(?:CPU(?: iPhone)? OS|OS)\s+([0-9_]+)/i);
      if (osMatch) return `iOS ${osMatch[1].replaceAll("_", ".")}`;

      const safariVersionMatch = ua.match(/Version\/([0-9.]+)/i);
      return safariVersionMatch ? `iOS ${safariVersionMatch[1]}` : tr("iosDetected", "iOS detected");
    }

    function cleanGpuName(name) {
      if (!name) return tr("unknown", "Unknown");

      return String(name)
        .replace(/^ANGLE\s*\(/i, "")
        .replace(/\s*Direct3D.*$/i, "")
        .replace(/\s*D3D11.*$/i, "")
        .replace(/\s*vs_.*$/i, "")
        .replace(/\s*ps_.*$/i, "")
        .replace(/\s*\(0x[0-9a-fA-F]+\)/g, "")
        .replace(/\s*\([^)]+GPU[^)]*\)/gi, "")
        .replace(/\)$/g, "")
        .replace(/^NVIDIA,\s*NVIDIA\s+/i, "NVIDIA ")
        .replace(/^NVIDIA,\s*/i, "NVIDIA ")
        .replace(/^AMD,\s*AMD\s+/i, "AMD ")
        .replace(/^AMD,\s*/i, "AMD ")
        .replace(/^Intel,\s*Intel\s+/i, "Intel ")
        .replace(/^Intel,\s*/i, "Intel ")
        .replace(/\s+/g, " ")
        .trim() || tr("unknown", "Unknown");
    }

    function detectGpuClass(renderer) {
      const text = String(renderer || "").toLowerCase();

      if (!renderer) return { detected: false, type: "Unknown" };

      if (
        text.includes("swiftshader") ||
        text.includes("llvmpipe") ||
        text.includes("software") ||
        text.includes("basic render driver") ||
        text.includes("microsoft basic")
      ) {
        return { detected: false, type: "Graphics Acceleration OFF / Basic Renderer" };
      }

      if (text.includes("nvidia") || text.includes("geforce") || text.includes("rtx") || text.includes("gtx")) {
        return { detected: true, type: "NVIDIA GPU" };
      }

      if (text.includes("radeon") || text.includes("amd")) {
        return { detected: true, type: "AMD GPU" };
      }

      if (text.includes("intel")) {
        return { detected: true, type: "Intel GPU" };
      }

      if (text.includes("apple")) {
        return { detected: true, type: "Apple GPU" };
      }

      if (text.includes("mali") || text.includes("adreno") || text.includes("powervr")) {
        return { detected: true, type: "Mobile GPU" };
      }

      return { detected: true, type: "GPU detected" };
    }

    function getWebGLInfo() {
      try {
        const canvas = document.createElement("canvas");
        const gl = canvas.getContext("webgl2") || canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
        if (!gl) {
          return {
            renderer: "Unavailable",
            vendor: "Unavailable",
            cleanRenderer: "Unavailable",
            gpuClass: "Unknown",
            detected: false,
            supported: false
          };
        }

        const debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
        const renderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
        const vendor = debugInfo ? gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR);
        const cleanRenderer = cleanGpuName(renderer);
        const gpuClass = detectGpuClass(`${renderer} ${vendor} ${cleanRenderer}`);

        return {
          renderer: renderer || "Unknown",
          vendor: vendor || "Unknown",
          cleanRenderer,
          gpuClass: gpuClass.type,
          detected: gpuClass.detected,
          supported: true
        };
      } catch (error) {
        return {
          renderer: "Blocked",
          vendor: "Blocked",
          cleanRenderer: "Blocked",
          gpuClass: "Blocked",
          detected: false,
          supported: false
        };
      }
    }

    async function getStorageInfo() {
      if (!navigator.storage?.estimate) return { quotaGb: null, usageGb: null, freeGb: null };
      try {
        const estimate = await navigator.storage.estimate();
        const quotaGb = bytesToGb(estimate.quota);
        const usageGb = bytesToGb(estimate.usage);
        const freeGb = Number.isFinite(quotaGb) && Number.isFinite(usageGb) ? quotaGb - usageGb : null;
        return { quotaGb, usageGb, freeGb };
      } catch (error) {
        return { quotaGb: null, usageGb: null, freeGb: null };
      }
    }

    function getRamInfo() {
      const ram = Number(navigator.deviceMemory);
      return Number.isFinite(ram) ? ram : null;
    }

    function getCpuInfo() {

    async function measureLatency(url, attempts = 3) {
      const values = [];

      for (let i = 0; i < attempts; i++) {
        const start = performance.now();

        try {
          await fetch(`${url}?latency=${Date.now()}-${i}`, {
            method: "HEAD",
            cache: "no-store",
            mode: "cors"
          });

          values.push(performance.now() - start);
        } catch (error) {
          try {
            await fetch(`${url}?latency=${Date.now()}-${i}`, {
              method: "GET",
              cache: "no-store",
              mode: "cors"
            });

            values.push(performance.now() - start);
          } catch (_) {}
        }
      }

      if (!values.length) return null;
      return Math.round(values.reduce((a, b) => a + b, 0) / values.length);
    }

    async function runInternetSpeedTest() {
      /*
        FAST-like browser speed test for GitHub Pages.

        The download test reads the response stream chunk by chunk instead of
        building large Blob objects. That keeps memory steady even with larger
        download packages, which is what makes high-speed tests usable.

        Uses Cloudflare Speed endpoints:
        - Download: https://speed.cloudflare.com/__down
        - Upload: https://speed.cloudflare.com/__up
        - Latency: https://speed.cloudflare.com/__down?bytes=1
      */

      const BASE = "https://speed.cloudflare.com";
      const LATENCY_URL = `${BASE}/__down?bytes=1`;

      const osKey = detectOS().os;

      const SPEED_PROFILES = {
        default: {
          downloadParallelMin: 1,
          downloadParallelMax: 6,
          uploadParallelMin: 1,
          uploadParallelMax: 3,
          durationMinSec: 5,
          durationMaxSec: 30,
          targetDurationSec: 10,
          downloadChunkBytes: 5_000_000,
          uploadChunkBytes: 1_000_000,
          latencySamples: 5,
          sampleIntervalMs: 350,
          warmupMs: 1_200,
          downloadPeakCap: 1.24,
          uploadPeakCap: 1.1,
          yieldEveryBytes: 1_500_000
        },
        android: {
          downloadParallelMin: 1,
          downloadParallelMax: 5,
          uploadParallelMin: 1,
          uploadParallelMax: 3,
          durationMinSec: 5,
          durationMaxSec: 30,
          targetDurationSec: 10,
          downloadChunkBytes: 4_000_000,
          uploadChunkBytes: 1_000_000,
          latencySamples: 5,
          sampleIntervalMs: 350,
          warmupMs: 1_200,
          downloadPeakCap: 1.2,
          uploadPeakCap: 1.08,
          yieldEveryBytes: 1_000_000
        },
        ios: {
          downloadParallelMin: 1,
          downloadParallelMax: 5,
          uploadParallelMin: 1,
          uploadParallelMax: 3,
          durationMinSec: 5,
          durationMaxSec: 30,
          targetDurationSec: 10,
          downloadChunkBytes: 4_000_000,
          uploadChunkBytes: 1_000_000,
          latencySamples: 5,
          sampleIntervalMs: 350,
          warmupMs: 1_200,
          downloadPeakCap: 1.2,
          uploadPeakCap: 1.08,
          yieldEveryBytes: 1_000_000
        },
        windows: {
          downloadParallelMin: 1,
          downloadParallelMax: 8,
          uploadParallelMin: 1,
          uploadParallelMax: 5,
          durationMinSec: 5,
          durationMaxSec: 30,
          targetDurationSec: 10,
          downloadChunkBytes: 10_000_000,
          uploadChunkBytes: 2_000_000,
          latencySamples: 5,
          sampleIntervalMs: 350,
          warmupMs: 1_200,
          downloadPeakCap: 1.26,
          uploadPeakCap: 1.08,
          yieldEveryBytes: 2_000_000
        }
      };

      const SETTINGS = SPEED_PROFILES[osKey] || SPEED_PROFILES.default;
      const supportsStreamedDownload = typeof ReadableStream !== "undefined";
      const downloadChunkBytes = supportsStreamedDownload
        ? SETTINGS.downloadChunkBytes
        : Math.min(SETTINGS.downloadChunkBytes, 3_000_000);
      const uploadChunkBytes = SETTINGS.uploadChunkBytes;
      const hardware = Number(navigator.hardwareConcurrency || 4);

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function round1(value) {
        return Math.round(value * 10) / 10;
      }

      function now() {
        return performance.now();
      }

      function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }

      const downloadConnections = clamp(
        Math.max(1, hardware),
        SETTINGS.downloadParallelMin,
        SETTINGS.downloadParallelMax
      );

      const uploadConnections = clamp(
        Math.max(1, Math.floor(hardware / 2) || 1),
        SETTINGS.uploadParallelMin,
        SETTINGS.uploadParallelMax
      );

      const durationMs = clamp(
        SETTINGS.targetDurationSec * 1000,
        SETTINGS.durationMinSec * 1000,
        SETTINGS.durationMaxSec * 1000
      );

      async function fetchNoStore(url, options = {}) {
        return fetch(`${url}${url.includes("?") ? "&" : "?"}t=${Date.now()}-${Math.random()}`, {
          cache: "no-store",
          mode: "cors",
          ...options
        });
      }

      async function cancelResponseBody(response) {
        try {
          if (response?.body?.cancel) await response.body.cancel();
        } catch (_) {}
      }

      async function latencySample() {
        const start = now();

        try {
          const response = await fetchNoStore(LATENCY_URL, {
            method: "GET",
            priority: "high"
          });

          await cancelResponseBody(response);
          if (!response.ok) return null;
          return now() - start;
        } catch (error) {
          return null;
        }
      }

      function summarizeFastestLatency(values, keepRatio) {
        if (!values.length) return null;
        const sorted = values.slice().sort((a, b) => a - b);
        const keepCount = Math.max(1, Math.ceil(sorted.length * keepRatio));
        const kept = sorted.slice(0, keepCount);
        return Math.round(kept.reduce((a, b) => a + b, 0) / kept.length);
      }

      function browserHttpLatencyToFastMs(rawMs) {
        if (!Number.isFinite(rawMs)) return null;

        if (rawMs <= 90) {
          return Math.max(1, Math.round(rawMs / 7.6));
        }

        if (rawMs <= 180) {
          return Math.round(12 + ((rawMs - 90) * 0.35));
        }

        return Math.round(44 + ((rawMs - 180) * 0.5));
      }

      async function averageLatency(samples = SETTINGS.latencySamples) {
        const values = [];

        for (let i = 0; i < samples; i++) {
          const value = await latencySample();
          if (Number.isFinite(value)) values.push(value);
          await sleep(80);
        }

        return summarizeFastestLatency(values, 0.7);
      }

      async function loadedLatencyUntil(doneRef, samples = 20) {
        const values = [];
        await sleep(450);

        for (let i = 0; i < samples && !doneRef.done; i++) {
          const value = await latencySample();
          if (Number.isFinite(value)) values.push(value);
          await sleep(120);
        }

        return summarizeFastestLatency(values, 0.3);
      }

      function normalizeLoadedLatency(rawLoadedMs, rawUnloadedMs) {
        if (!Number.isFinite(rawLoadedMs)) return null;
        if (!Number.isFinite(rawUnloadedMs)) return browserHttpLatencyToFastMs(rawLoadedMs);

        const addedLatencyMs = Math.max(0, rawLoadedMs - rawUnloadedMs);
        const browserQueueCapMs = Math.max(6, Math.min(20, rawUnloadedMs * 0.25 + 6));
        const normalizedRawMs = rawUnloadedMs + Math.min(addedLatencyMs, browserQueueCapMs);
        const unloadedFastMs = browserHttpLatencyToFastMs(rawUnloadedMs);
        const loadedFastMs = browserHttpLatencyToFastMs(normalizedRawMs);

        return Math.max(unloadedFastMs, Math.min(loadedFastMs, unloadedFastMs + 2));
      }

      function recordBytes(state, bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) return;

        const sampleAt = now();
        state.bytes += bytes;

        const sampleMs = sampleAt - state.lastSampleAt;
        if (sampleMs < SETTINGS.sampleIntervalMs) return;

        const sampleBytes = state.bytes - state.lastSampleBytes;
        if (sampleBytes > 0) {
          state.samples.push({
            atMs: sampleAt - state.start,
            mbps: (sampleBytes * 8) / (sampleMs / 1000) / 1000 / 1000
          });
        }

        state.lastSampleAt = sampleAt;
        state.lastSampleBytes = state.bytes;
      }

      function finalizeSample(state) {
        const stopAt = state.stop || now();
        const sampleMs = stopAt - state.lastSampleAt;
        const sampleBytes = state.bytes - state.lastSampleBytes;

        if (sampleMs > 0 && sampleBytes > 0) {
          state.samples.push({
            atMs: stopAt - state.start,
            mbps: (sampleBytes * 8) / (sampleMs / 1000) / 1000 / 1000
          });
        }
      }

      function calculateFastLikeMbps(state, type) {
        const elapsedSec = Math.max(0.001, ((state.stop || now()) - state.start) / 1000);
        const averageMbps = (state.bytes * 8) / elapsedSec / 1000 / 1000;
        const activeSamples = state.samples
          .filter(sample => sample.atMs >= SETTINGS.warmupMs && Number.isFinite(sample.mbps) && sample.mbps > 0)
          .map(sample => sample.mbps)
          .sort((a, b) => a - b);

        if (activeSamples.length < 3) return round1(averageMbps);

        const topHalf = activeSamples.slice(Math.floor(activeSamples.length * 0.5));
        const stablePeak = topHalf.reduce((a, b) => a + b, 0) / topHalf.length;
        const peakCap = type === "download" ? SETTINGS.downloadPeakCap : SETTINGS.uploadPeakCap;
        const fastLikeMbps = Math.max(averageMbps, Math.min(stablePeak, averageMbps * peakCap));

        return round1(fastLikeMbps);
      }

      async function readDownloadChunk(state, signal) {
        const response = await fetchNoStore(`${BASE}/__down?bytes=${downloadChunkBytes}`, {
          method: "GET",
          signal,
          priority: "low"
        });

        if (!response.ok) throw new Error(`Download HTTP ${response.status}`);

        if (!response.body?.getReader) {
          const buffer = await response.arrayBuffer();
          recordBytes(state, buffer.byteLength);
          return buffer.byteLength;
        }

        const reader = response.body.getReader();
        let bytes = 0;
        let bytesSinceYield = 0;

        try {
          while (!state.done) {
            const { done, value } = await reader.read();
            if (done) break;

            const size = value?.byteLength || 0;
            bytes += size;
            bytesSinceYield += size;
            recordBytes(state, size);

            if (bytesSinceYield >= SETTINGS.yieldEveryBytes) {
              bytesSinceYield = 0;
              await sleep(0);
            }
          }

          if (state.done) {
            try {
              await reader.cancel();
            } catch (_) {}
          }
        } finally {
          try {
            reader.releaseLock();
          } catch (_) {}
        }

        return bytes;
      }

      async function downloadWorker(state) {
        let requests = 0;

        while (!state.done) {
          const controller = new AbortController();
          state.controllers.add(controller);

          try {
            await readDownloadChunk(state, controller.signal);
            requests++;
          } catch (error) {
            if (!state.done && error.name !== "AbortError") throw error;
          } finally {
            state.controllers.delete(controller);
          }

          await sleep(0);
        }

        return { requests };
      }

      async function uploadWorker(state) {
        let requests = 0;
        const data = new Uint8Array(uploadChunkBytes);
        crypto.getRandomValues(data.subarray(0, Math.min(data.length, 65_536)));

        while (now() < state.endAt) {
          const response = await fetchNoStore(`${BASE}/__up`, {
            method: "POST",
            body: data,
            priority: "low"
          });

          if (!response.ok) throw new Error(`Upload HTTP ${response.status}`);
          recordBytes(state, data.byteLength);
          requests++;
          await sleep(0);
        }

        return { requests };
      }

      async function parallelThroughputTest(type) {
        const isDownload = type === "download";
        const connections = isDownload ? downloadConnections : uploadConnections;
        const worker = isDownload ? downloadWorker : uploadWorker;
        const start = now();
        const state = {
          start,
          stop: null,
          endAt: start + durationMs,
          done: false,
          bytes: 0,
          samples: [],
          lastSampleAt: start,
          lastSampleBytes: 0,
          controllers: new Set()
        };
        const doneRef = { done: false };

        const latencyPromise = loadedLatencyUntil(doneRef, 20);
        const stopTimer = setTimeout(() => {
          state.done = true;

          if (isDownload) {
            state.stop = now();
            state.controllers.forEach(controller => controller.abort());
          }
        }, durationMs);

        try {
          const results = await Promise.all(Array.from({ length: connections }, () => worker(state)));
          state.done = true;
          state.stop = state.stop || now();
          doneRef.done = true;
          clearTimeout(stopTimer);
          finalizeSample(state);

          const totalRequests = results.reduce((sum, item) => sum + item.requests, 0);
          const loadedLatencyMs = await latencyPromise;
          const elapsedSec = (state.stop - state.start) / 1000;

          return {
            mbps: calculateFastLikeMbps(state, type),
            bytes: state.bytes,
            requests: totalRequests,
            seconds: round1(elapsedSec),
            connections,
            loadedLatencyMs
          };
        } finally {
          clearTimeout(stopTimer);
          doneRef.done = true;
          state.done = true;
          state.controllers.forEach(controller => controller.abort());
        }
      }

      const rawUnloadedLatencyMs = await averageLatency(SETTINGS.latencySamples);
      const download = await parallelThroughputTest("download");
      const upload = await parallelThroughputTest("upload");

      const loadedLatencyValues = [download.loadedLatencyMs, upload.loadedLatencyMs].filter(Number.isFinite);
      const rawLoadedLatencyMs = loadedLatencyValues.length
        ? Math.round(loadedLatencyValues.reduce((a, b) => a + b, 0) / loadedLatencyValues.length)
        : null;
      const unloadedLatencyMs = browserHttpLatencyToFastMs(rawUnloadedLatencyMs);
      const loadedLatencyMs = normalizeLoadedLatency(rawLoadedLatencyMs, rawUnloadedLatencyMs);

      return {
        downloadMbps: download.mbps,
        uploadMbps: upload.mbps,
        latencyUnloadedMs: unloadedLatencyMs,
        latencyLoadedMs: loadedLatencyMs,
        downloadTestSizeMb: round1(download.bytes / 1024 / 1024),
        uploadTestSizeMb: round1(upload.bytes / 1024 / 1024),
        downloadConnections: download.connections,
        uploadConnections: upload.connections,
        testDurationSec: SETTINGS.targetDurationSec,
        downloadChunkMb: round1(downloadChunkBytes / 1000 / 1000),
        uploadChunkMb: round1(uploadChunkBytes / 1000 / 1000),
        source: "Cloudflare Speed Stream Mode"
      };
    }

        if (bitness) osLabel += ` ${bitness}`;
      }
      if (osInfo.os === "android") osLabel = getAndroidVersionLabel(osInfo.ua, highEntropy);
      if (osInfo.os === "ios") osLabel = parseIOSVersion(osInfo.ua);
      if (osInfo.os === "macos") osLabel = tr("macosDetectedNotReleased", "macOS detected - not released");

      const sideCards = [];
      let passCount = 0;
      let totalScoreChecks = 0;

      if (!req) {
        sideCards.push(card(tr("platformTitle", "Platform"), osInfo.os === "macos" ? "fail" : "warn", `<span class="value">${escapeHtml(osLabel)}</span><br>${escapeHtml(tr("unsupportedPlatformText", "This platform is not currently supported by the requirements table."))}`));
      } else {
        let osPass = true;

        if (osInfo.os === "windows") {
          const isWin10Or11 = /Windows 10|Windows 11|Windows 10\/11/i.test(osLabel);
          const is64 = /64-bit/i.test(osLabel);
          osPass = isWin10Or11 && is64;
        }

        if (osInfo.os === "android") osPass = compareVersion(osLabel, 10);
        if (osInfo.os === "ios") osPass = compareVersion(osLabel, 15);

        sideCards.push(card(tr("platformTitle", "Platform"), osPass === null ? "warn" : osPass ? "pass" : "fail", `<span class="value">${escapeHtml(osLabel)}</span><br>${escapeHtml(tr("requiredLabel", "Required"))}: ${escapeHtml(req.osText)}.`));
        if (osPass) passCount++;
        totalScoreChecks++;
      }

      if (req) {
        const ramStatus = ramGb === null ? "warn" : ramGb >= req.minRamGb ? "pass" : "fail";
        const storageStatus = storage.freeGb === null ? "warn" : storage.freeGb >= req.minStorageGb ? "pass" : "fail";
        sideCards.push(card(tr("storageTitle", "Storage"), storageStatus, `<span class="value">${formatGb(storage.freeGb)} ${escapeHtml(tr("availableForBrowserOrigin", "available for browser origin"))}</span><br>${escapeHtml(tr("requiredLabel", "Required"))}: ${req.minStorageGb}+ GB. ${escapeHtml(tr("browserStorageNote", "Browser storage is not the same as full disk free space."))}`));
        if (storage.freeGb !== null) {
          if (storage.freeGb >= req.minStorageGb) passCount++;
          totalScoreChecks++;
        }

        sideCards.push(card(tr("memoryTitle", "Memory RAM"), ramStatus, `<span class="value">${ramGb === null ? escapeHtml(tr("unknown", "Unknown")) : `${ramGb}+ ${escapeHtml(tr("gbDetected", "GB detected"))}`}</span><br>${escapeHtml(tr("requiredLabel", "Required"))}: ${req.minRamGb}+ GB. ${escapeHtml(tr("browserRamNote", "Browser RAM detection is approximate."))}`));
        if (ramGb !== null) {
          if (ramGb >= req.minRamGb) passCount++;
          totalScoreChecks++;
        }
      }

      if (osInfo.os === "windows") {
        const graphicsStatus = webgl.detected ? "pass" : "fail";
        const graphicsFix = webgl.gpuClass.includes("Acceleration OFF")
          ? `<br><br><button class="button-main" type="button" onclick="handleGraphicsAccelerationButton(this)">${escapeHtml(tr("gpuButton", "GPU Acceleration"))}</button>`
          : "";

        sideCards.push(card(tr("graphicsTitle", "Graphic Card / GPU"), graphicsStatus, `
          <span class="value">${escapeHtml(webgl.cleanRenderer)}</span><br>
          ${escapeHtml(tr("typeLabel", "Type"))}: ${escapeHtml(webgl.gpuClass)}.<br>
          ${escapeHtml(tr("vendorLabel", "Vendor"))}: ${escapeHtml(webgl.vendor)}.<br>
          ${escapeHtml(tr("requiredLabel", "Required"))}: ${escapeHtml(req?.minGpuText || tr("graphicCardRequired", "Graphic card required"))}.
          ${graphicsFix}
        `));

        if (req?.gpuRequired) {
          if (webgl.detected) passCount++;
          totalScoreChecks++;
        }
      }

      return { osLabel, sideCards, passCount, totalScoreChecks };
    }

    function renderScanResults(scanContext, internet, options = {}) {
      const results = document.getElementById("results");
      if (!results || !scanContext) return;

      const model = buildScanModel(scanContext);
      lastDeviceContext = {
        basePassCount: model.passCount,
        baseTotalScoreChecks: model.totalScoreChecks,
        req: scanContext.req,
        webgl: scanContext.webgl
      };

      const internetCard = options.internetPending
        ? internetLoadingCard()
        : buildInternetCard(internet, scanContext.req);

      const mainCardsHtml = model.sideCards.length
        ? `
          <div class="check-main-grid">
            <div class="check-side-stack">${model.sideCards.join("")}</div>
            ${internetCard}
          </div>
        `
        : `<div class="grid">${internetCard}</div>`;

      results.dataset.state = "scan";
      results.innerHTML = `
        <div class="summary">
          <div class="score-ring" id="scoreRing">...</div>
          <div>
            <h3 id="verdictTitle">${escapeHtml(tr("testingInternetTitle", "Testing Internet Speed"))}</h3>
            <p id="verdictText">${escapeHtml(tr("deviceDetectedText", "Device information has been detected. Internet speed is now being tested."))}</p>
          </div>
        </div>

        ${mainCardsHtml}

        <details>
          <summary class="button-ghost" style="display:inline-flex; width:auto; margin-bottom:10px;">${escapeHtml(tr("showRawData", "Show raw browser data"))}</summary>
          <pre class="raw">${escapeHtml(JSON.stringify({
            detectedOS: scanContext.osInfo.os,
            osLabel: model.osLabel,
            userAgent: scanContext.osInfo.ua,
            platform: scanContext.osInfo.platform,
            userAgentDataBrands: scanContext.osInfo.brands,
            highEntropyUA: scanContext.highEntropy,
            deviceMemoryGbApprox: scanContext.ramGb,
            storageEstimateGb: scanContext.storage,
            webgl: scanContext.webgl
          }, null, 2))}</pre>
        </details>
      `;

      if (!options.internetPending) updateSummaryAfterInternet(internet);
    }

    function updateSummaryAfterInternet(internet) {
      if (!lastDeviceContext) return;

      const { basePassCount, baseTotalScoreChecks, req, webgl } = lastDeviceContext;
      let passCount = basePassCount;
      let totalScoreChecks = baseTotalScoreChecks;

      if (internet) {
        const speedOk = Number.isFinite(internet.downloadMbps) && internet.downloadMbps >= (req?.minDownloadMbps || 50);
        const unloadedOk = internet.latencyUnloadedMs === null || internet.latencyUnloadedMs <= (req?.minLatencyMs || 100);
        const loadedOk = internet.latencyLoadedMs === null || internet.latencyLoadedMs <= (req?.minLatencyMs || 100);

        if (speedOk && unloadedOk && loadedOk) passCount++;
        totalScoreChecks++;
      }

      const score = totalScoreChecks ? Math.round((passCount / totalScoreChecks) * 100) : 0;
      const scoreEl = document.getElementById("scoreRing");
      const titleEl = document.getElementById("verdictTitle");
      const textEl = document.getElementById("verdictText");

      if (scoreEl) scoreEl.textContent = `${score}%`;

      let verdict = tr("manualCheckRequired", "Manual check required");
      let verdictText = tr("manualCheckText", "Your browser blocked or does not expose enough data for a complete compatibility result.");

      if (webgl.gpuClass.includes("Acceleration OFF")) {
        verdict = tr("enableGpuAcceleration", "Enable GPU Acceleration");
        verdictText = tr("enableGpuText", "Your browser is using a basic/software renderer. Enable graphics acceleration, restart the browser and scan again.");
      } else if (req && score >= 90) {
        verdict = tr("looksCompatible", "Looks compatible");
        verdictText = tr("looksCompatibleText", "Your device appears to match the browser-detectable minimum requirements.");
      } else if (req && score >= 60) {
        verdict = tr("probablyPlayable", "Probably playable, but check details");
        verdictText = tr("probablyPlayableText", "Some required data is missing or borderline. Check the cards below before installing.");
      } else if (req) {
        verdict = tr("belowMinimums", "Below or unknown minimums");
        verdictText = tr("belowMinimumsText", "At least one browser-detectable requirement is missing or below the minimum.");
      }

      if (titleEl) titleEl.textContent = verdict;
      if (textEl) textEl.textContent = verdictText;
    }

    async function runInternetOnly() {
      if (isInternetRefreshRunning || !lastDeviceContext) return;

      isInternetRefreshRunning = true;
      lastInternetResult = undefined;
      const cardEl = document.getElementById("internetSpeedCard");
      if (cardEl) cardEl.outerHTML = internetLoadingCard();

      let internet = null;

      try {
        internet = await runInternetSpeedTestStable();
      } catch (error) {
        internet = null;
      }

      lastInternetResult = internet;
      const newCard = buildInternetCard(internet, lastDeviceContext.req);
      const freshCard = document.getElementById("internetSpeedCard");
      if (freshCard) freshCard.outerHTML = newCard;

      updateSummaryAfterInternet(internet);
      isInternetRefreshRunning = false;
    }

    async function runCheck() {
      const results = document.getElementById("results");
      results.dataset.state = "running";
      results.innerHTML = `<div class="notice">${escapeHtml(tr("scanningDeviceInfo", "Scanning device information..."))}</div>`;

      const osInfo = detectOS();
      const highEntropy = await getHighEntropyUA();
      const webgl = getWebGLInfo();
      const storage = await getStorageInfo();
      const ramGb = getRamInfo();
      const req = MINIMUMS[osInfo.os];

      const gpuButton = document.getElementById("gpuAccelBtn");
      if (gpuButton) {
        gpuButton.style.display = osInfo.os === "windows" ? "inline-flex" : "none";
      }

      lastScanContext = { osInfo, highEntropy, webgl, storage, ramGb, req };
      lastInternetResult = undefined;
      renderScanResults(lastScanContext, undefined, { internetPending: true });
      await runInternetOnly();
    }

    function shouldAutoRunCheck() {
      const params = new URLSearchParams(window.location.search);
      const autorun = params.get("autorun");
      if (autorun === "0") return false;
      if (autorun === "1") return true;
      return window.parent === window;
    }

    function startAutoRunCheck() {
      if (hasAutoRunStarted || !shouldAutoRunCheck()) return;
      hasAutoRunStarted = true;
      window.setTimeout(() => {
        if (!lastScanContext && !isInternetRefreshRunning) runCheck();
      }, 120);
    }

    function notifyParentReady() {
      if (window.parent && window.parent !== window) {
        try {
          window.parent.postMessage({ type: "tcl:page-ready" }, "*");
        } catch (error) {
          console.warn("Failed to notify parent page ready", error);
        }
      }
    }

    function goBackToGameRequirements() {
      if (window.parent && window.parent !== window) {
        try {
          window.parent.postMessage({ type: "tcl:navigate", page: "game-requirements" }, "*");
          return;
        } catch (error) {
          console.warn("Back navigation through parent failed", error);
        }
      }

      if (window.history.length > 1) {
        window.history.back();
        return;
      }

      window.location.href = "Game_Requirements.html";
    }

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || data.type !== "tcl:set-lang") return;
      setCanIRunLang(data.lang);
    });

    window.addEventListener("storage", (event) => {
      if (event.key !== CANIRUN_LANG_STORAGE_KEY || !event.newValue) return;
      setCanIRunLang(event.newValue);
    });

    setCanIRunLang(resolveStartupLang());

    document.addEventListener("DOMContentLoaded", () => {
      const osInfo = detectOS();
      const gpuButton = document.getElementById("gpuAccelBtn");
      if (gpuButton) {
        gpuButton.style.display = osInfo.os === "windows" ? "inline-flex" : "none";
      }
      notifyParentReady();
      startAutoRunCheck();
    });

  </script>

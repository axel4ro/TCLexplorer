body {
  font-family: 'Segoe UI', Arial, sans-serif;

/* === HEADER === */
header {
  background: linear-gradient(90deg, #101729, #141a33);
  padding: 18px 20px;
  display:flex;
  align-items:center;
  justify-content: space-between;  /* 🔥 logo stânga, nav dreapta */

nav {

  gap: 10px;
}

nav button,
button {

  color: #fff;

  padding: 10px 18px;
  border-radius: 10px;

nav button:hover, button:hover {

}

nav button:active, button:active {
  transform: translateY(0);

}

nav button.active {

/* === FIX pentru imagine NFT în modal === */
.modal-left img {

/* === FIX pentru container modal === */
#modal-content {

/* === TOOLBAR SUB HEADER === */
.subbar {

/* === GRID === */
.grid {

  <script>
    const TCL_API = "https://api.tclexplorer.com";
    const MVX_API_FALLBACK = "https://api.multiversx.com";
    let tclPriceUSD = 0;
    async function loadTCLPrice() {
      try {
        const r = await fetch("https://api.dexscreener.com/latest/dex/pairs/multiversx/erd1qqqqqqqqqqqqqpgq6quepqlx66rmwst8uxl6p28jhcrnva982jpszqhxff");
        const d = await r.json();
        tclPriceUSD = parseFloat(d?.pairs?.[0]?.priceUsd || 0);
      } catch {}
    }
    function fmtTCL(bigintVal) {
      return (Number(bigintVal) / 1e18).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    }
    // Storage display: raw TCL (1e18) / (SC_price * 200) = × 5 at current SC price $0.001
    const SC_STORAGE_PRICE = 0.001;
    function fmtStorage(bigintVal) {
      return (Number(bigintVal) / 1e18 / (SC_STORAGE_PRICE * 200)).toLocaleString('en-US', {maximumFractionDigits: 0});
    }

    const creators = [
      "erd1tpayjteeg67rq7me94k36705dh2c077xjsmhzdmkkwjeg0w00ufsmmltyc",
      "erd1qqqqqqqqqqqqqpgqm77vv5dcqs6kuzhj540vf67f90xemypd0ufsygvnvk"
    ];

    let currentView = "collections";
	let allNFTs = [];
	let forSaleList = [];
    let allNFTsByCollection = {};
    const NFTS_CACHE_PREFIX = "tclExplorer.nfts.v5"; // v5 = storage display × 5 formula
    const NFTS_CACHE_TTL = {
      collections: 5 * 60 * 1000,   // 5 min (server e rapid)
      allNFTs: 5 * 60 * 1000,
      collectionImage: 24 * 60 * 60 * 1000,
      nftDetails: 5 * 60 * 1000,
      walletBalance: 2 * 60 * 1000
    };
    const nftRequestPool = {};

    function buildCacheKey(section, suffix = "") {
      const tail = suffix ? `.${encodeURIComponent(String(suffix))}` : "";
      return `${NFTS_CACHE_PREFIX}.${section}${tail}`;
    }

    function writeCache(section, data, suffix = "") {
      try {
        localStorage.setItem(
          buildCacheKey(section, suffix),
          JSON.stringify({
            cachedAt: Date.now(),
            data
          })
        );
      } catch (e) {
        console.warn("Cache write failed", section, suffix, e);
      }
    }

    function readCacheEntry(section, suffix = "") {
      try {
        const raw = localStorage.getItem(buildCacheKey(section, suffix));
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        console.warn("Cache invalid", section, suffix, e);
        return null;
      }
    }

    function getCache(section, maxAgeMs, suffix = "") {
      const entry = readCacheEntry(section, suffix);
      if (!entry || typeof entry.cachedAt !== "number") return null;
      if (Date.now() - entry.cachedAt > maxAgeMs) return null;
      return entry.data;
    }

    function getCachedValue(section, suffix = "") {
      return readCacheEntry(section, suffix)?.data ?? null;
    }

    function withNFTRequest(key, loader) {
      if (nftRequestPool[key]) return nftRequestPool[key];
      nftRequestPool[key] = Promise.resolve()
        .then(loader)
        .finally(() => {
          delete nftRequestPool[key];
        });
      return nftRequestPool[key];
    }

    function persistAllNFTsCache() {
      writeCache("allNFTs", allNFTsByCollection);
    }

    async function getCollectionImage(collection) {
      const cachedImage = getCache("collectionImage", NFTS_CACHE_TTL.collectionImage, collection);
      if (typeof cachedImage === "string" && cachedImage) {
        return cachedImage;
      }

      return withNFTRequest(`collectionImage:${collection}`, async () => {
        try {
          const resp = await fetch(`https://api.multiversx.com/collections/${collection}/nfts?size=1`);
          const data = await resp.json();
          const image = (data.length > 0 && data[0].media && data[0].media[0]) ? data[0].media[0].url : "";
          if (image) writeCache("collectionImage", image, collection);
          return image;
        } catch (e) {
          console.error("fallback image", collection, e);
          return getCachedValue("collectionImage", collection) || "";
        }
      });
    }

function notifyParentReady() {
  try {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: "tcl:page-ready", page: "nfts" }, "*");
    }
  } catch (e) {
    console.warn("parent ready notify failed", e);
  }
}

function waitForContainerImages(container) {
  if (!container) return Promise.resolve();
  const images = Array.from(container.querySelectorAll("img")).filter(img => img.getAttribute("src"));
  if (images.length === 0) return Promise.resolve();

  return Promise.all(images.map((img) => {
    if (img.complete && img.naturalWidth > 0) return Promise.resolve();
    return new Promise((resolve) => {
      const done = () => resolve();
      img.addEventListener("load", done, { once: true });
      img.addEventListener("error", done, { once: true });
    });
  }));
}

async function loadCollections() {
  const container = document.getElementById("collections");
  const nftsGrid  = document.getElementById("nfts");
  container.style.display = "grid";
  nftsGrid.style.display = "none";
  document.getElementById("filterBar").style.display = "none";
  document.getElementById("backBtn").style.display = "none";

  container.innerHTML = "Loading collections...";

  let all = getCache("collections", NFTS_CACHE_TTL.collections);
  if (all) {
    console.log("Loaded collections from localStorage cache");
  } else {
    all = await withNFTRequest("collections", async () => {
      // Try server first (instant), fallback to MultiversX API
      try {
        const resp = await fetch(`${TCL_API}/api/nfts/collections`);
        if (resp.ok) {
          const data = await resp.json();
          if (data.length) {
            console.log(`Loaded ${data.length} collections from server`);
            // normalize to same shape as MultiversX API response
            const normalized = data.map(c => ({
              collection: c.collection,
              name: c.name,
              nftCount: c.nft_count,
              assets: { pngUrl: c.image_url },
            }));
            writeCache("collections", normalized);
            return normalized;
          }
        }
      } catch (e) {
        console.warn("Server collections failed, fallback to MultiversX API:", e.message);
      }

      // Fallback: MultiversX API
      let freshCollections = [];
      for (const creator of creators) {
        try {
          await new Promise(r => setTimeout(r, 300));
          const resp = await fetch(`${MVX_API_FALLBACK}/collections?creator=${creator}&size=50`);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          freshCollections = freshCollections.concat(data);
        } catch (err) {
          console.error("Eroare la fetch pentru creator:", creator, err);
        }
      }
      freshCollections = freshCollections.filter(col => !col.collection.startsWith("TCLSPONSOR"));
      writeCache("collections", freshCollections);
      return freshCollections;
    });
  }

  container.innerHTML = "";
  for (const col of all) {
    let image = col.assets?.pngUrl || col.assets?.svgUrl || "";
    if (!image) {
      try {
        await new Promise(r => setTimeout(r, 300));
        image = await getCollectionImage(col.collection);
      } catch (err) {
        console.warn("No image for", col.collection);
      }
    }

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${image}" alt="${col.collection}">
      <h3>${col.name}</h3>
      <p>${col.collection}</p>
    `;
    card.onclick = () => loadNFTs(col.collection);
    container.appendChild(card);
  }

  await waitForContainerImages(container);
  notifyParentReady();

  preloadAllNFTs(all).catch(err => console.error("NFT preload error", err));
}

async function preloadAllNFTs(collections) {
  let cache = getCache("allNFTs", NFTS_CACHE_TTL.allNFTs);
  if (cache) {
    console.log("Loaded ALL NFTs from localStorage cache");
    allNFTsByCollection = cache;
    return;
  }

  allNFTsByCollection = await withNFTRequest("allNFTs", async () => {
    // Try server bulk endpoint first
    try {
      const resp = await fetch(`${TCL_API}/api/nfts/all`);
      if (resp.ok) {
        const grouped = await resp.json();
        const total = Object.values(grouped).reduce((s, a) => s + a.length, 0);
        if (total > 0) {
          console.log(`Loaded ${total} NFTs from server (bulk)`);
          // normalize each NFT
          const payload = {};
          for (const [col, nfts] of Object.entries(grouped)) {
            payload[col] = nfts.map(normalizeServerNFT);
          }
          writeCache("allNFTs", payload);
          return payload;
        }
      }
    } catch (e) {
      console.warn("Server bulk NFT load failed, fallback to MultiversX API:", e.message);
    }

    // Fallback: per-collection from MultiversX API
    const payload = {};
    for (const col of collections) {
      try {
        await new Promise(r => setTimeout(r, 300));
        console.log("Fetching NFTs from MultiversX API", col.collection);
        const resp = await fetch(`${MVX_API_FALLBACK}/collections/${col.collection}/nfts?size=1000`);
        const data = await resp.json();
        payload[col.collection] = data;
      } catch (err) {
        console.error("Error fetching NFTs for", col.collection, err);
      }
    }
    writeCache("allNFTs", payload);
    return payload;
  });
}

// Normalize server DB row → MultiversX API shape expected by renderer
function normalizeServerNFT(nft) {
  return {
    ...nft.raw_api,
    identifier:       nft.identifier,
    collection:       nft.collection,
    nonce:            nft.nonce,
    name:             nft.name,
    royalties:        nft.royalties || 0,
    creator:          nft.creator,
    owner:            nft.owner,
    media:            nft.image_url ? [{ url: nft.image_url }] : (nft.raw_api?.media || []),
    metadata:         nft.metadata || nft.raw_api?.metadata || null,
    sc_quality:       nft.sc_quality       ?? null,
    sc_wave:          nft.sc_wave          ?? null,
    sc_has_bonus:     nft.sc_has_bonus     ?? null,
    sc_has_crystal:   nft.sc_has_crystal   ?? null,
    sc_socket_count:  nft.sc_socket_count  ?? null,
    sc_tcl_count:     nft.sc_tcl_count     ?? null,
    sc_tcl_max:       nft.sc_tcl_max       ?? null,
    sc_refinement_ts: nft.sc_refinement_ts ?? null,
  };
}

async function ensureCollectionNFTs(collection) {
  if (Array.isArray(allNFTsByCollection[collection])) {
    return allNFTsByCollection[collection];
  }

  const cachedAll = getCache("allNFTs", NFTS_CACHE_TTL.allNFTs);
  if (cachedAll && Array.isArray(cachedAll[collection])) {
    allNFTsByCollection = cachedAll;
    return cachedAll[collection];
  }

  return withNFTRequest(`collectionNFTs:${collection}`, async () => {
    // Try server first
    try {
      const resp = await fetch(`${TCL_API}/api/nfts/collection/${collection}`);
      if (resp.ok) {
        const data = await resp.json();
        if (data.length) {
          console.log(`Loaded ${data.length} NFTs from server for ${collection}`);
          const normalized = data.map(normalizeServerNFT);
          allNFTsByCollection[collection] = normalized;
          persistAllNFTsCache();
          return normalized;
        }
      }
    } catch (e) {
      console.warn(`Server NFT fetch failed for ${collection}, using MultiversX API`);
    }

    // Fallback: MultiversX API
    try {
      const resp = await fetch(`${MVX_API_FALLBACK}/collections/${collection}/nfts?size=1000`);
      const data = await resp.json();
      allNFTsByCollection[collection] = data;
      persistAllNFTsCache();
      return data;
    } catch (err) {
      console.error("Error fetching NFTs for collection", collection, err);
      return [];
    }
  });
}

async function renderNFTs(nfts) {
  const container = document.getElementById("nfts");
  container.innerHTML = "Loading NFTs...";

  let selectedAttr = document.getElementById("attrFilter").value;
  if (selectedAttr && selectedAttr.endsWith(" (+)")) {
    selectedAttr = selectedAttr.replace(" (+)", "");
  }

  let cardsHtml = "";  // 🔥 construim tot aici

  for (const nft of nfts) {
    const plusAttr = nft.metadata?.attributes?.find(a => typeof a.value === "string" && /\+\d+/.test(a.value));
    const title = plusAttr ? plusAttr.value : nft.name;

    let attrValue = "";
    if (selectedAttr) {
      const found = nft.metadata?.attributes?.find(a => a.trait_type === selectedAttr);
      if (found) attrValue = found.value;
    }

    // SC badges
    const qualityNames = ["","Common","Uncommon","Rare","Epic","Legendary"];
    const q = nft.sc_quality;
    const qualityBadge = q > 0
      ? `<span class="badge badge-quality-${Math.min(q,5)}">${qualityNames[q] || `Q${q}`}</span>` : "";
    const waveBadge = nft.sc_wave > 0
      ? `<span class="badge badge-wave">W${nft.sc_wave}</span>` : "";
    const bonusBadge = nft.sc_has_bonus
      ? `<span class="badge badge-bonus">✦ Bonus</span>` : "";
    const crystalBadge = nft.sc_has_crystal
      ? `<span class="badge badge-crystal">◈ Crystal</span>` : "";
    const socketBadge = nft.sc_socket_count > 0
      ? `<span class="badge badge-socket">⬡ ${nft.sc_socket_count}</span>` : "";

    // Storage bar
    const tclCount = nft.sc_tcl_count ? BigInt(nft.sc_tcl_count) : 0n;
    const tclMax   = nft.sc_tcl_max   ? BigInt(nft.sc_tcl_max)   : 0n;
    const storageHtml = tclMax > 0n ? (() => {
      const pct = Math.min(Number(tclCount * 100n / tclMax), 100);
      const maxDisplay = Number(tclMax) / 1e18 / (SC_STORAGE_PRICE * 200);
      const usdVal = tclPriceUSD && maxDisplay > 0 ? ` ≈ $${(maxDisplay / 2 * tclPriceUSD).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}` : '';
      return `
        <div class="storage-bar-wrap" title="TCL Storage">
          <div class="storage-bar-fill" style="width:${pct}%"></div>
        </div>
        <span class="storage-label">💾 ${fmtStorage(tclMax)} TCL${usdVal}</span>`;
    })() : "";

    const hasBadges = qualityBadge || waveBadge || bonusBadge || crystalBadge || socketBadge;
    // don't repeat attrValue if it's already the title
    const showAttr = attrValue && attrValue !== title;

    cardsHtml += `
      <div class="card" onclick="showNFTDetails('${nft.identifier}')">
        <img src="${nft.media?.[0]?.url || ''}" alt="${nft.name}">
        <h4>${title}</h4>
        ${showAttr ? `<p style="margin-top:6px; font-size:14px; color:#2ff6de;"><b>${selectedAttr}:</b> ${attrValue}</p>` : ""}
        ${hasBadges ? `<div class="nft-badges">${qualityBadge}${waveBadge}${bonusBadge}${crystalBadge}${socketBadge}</div>` : ""}
        ${storageHtml}
      </div>
    `;
  }

  // 🔥 injectăm o singură dată
  container.innerHTML = cardsHtml || `<p style="color:#9ca3af;">⚠️ No NFTs found.</p>`;
}


    function applyFilter(order) {
      let attr = document.getElementById("attrFilter").value;
      if (!attr) { renderNFTs(allNFTs); return; }
      if (attr.endsWith(" (+)")) attr = attr.replace(" (+)", "");

      const filtered = allNFTs.filter(nft =>
        nft.metadata?.attributes?.some(a => a.trait_type === attr)
      );

      filtered.sort((a, b) => {
        const aA = a.metadata.attributes.find(x => x.trait_type === attr);
        const aB = b.metadata.attributes.find(x => x.trait_type === attr);
        const vA = parseAttrValue(aA?.value);
        const vB = parseAttrValue(aB?.value);
        return order === "asc" ? vA - vB : vB - vA;
      });

      renderNFTs(filtered);
    }

    function applyInstantFilter() {
      let attr = document.getElementById("attrFilter").value;
      if (!attr) { renderNFTs(allNFTs); return; }
      if (attr.endsWith(" (+)")) attr = attr.replace(" (+)", "");

      const filtered = allNFTs.filter(nft =>
        nft.metadata?.attributes?.some(a => a.trait_type === attr)
      );
      renderNFTs(filtered);
    }

    function clearFilter() {
      document.getElementById("attrFilter").value = "";
      renderNFTs(allNFTs);
    }

    function parseAttrValue(val) {
      if (!val) return 0;
      if (typeof val === "string") {
        const plus = val.match(/\+(\d+)/); if (plus) return parseInt(plus[1]);
        if (val.includes("%")) return parseFloat(val.replace("%", "")) || 0;
        const num = parseFloat(val.replace(/[^\d.-]/g, ""));
        return isNaN(num) ? 0 : num;
      }
      return Number(val) || 0;
    }
// Live SC query from browser (fallback when server hasn't synced yet)
async function fetchScDataLive(collectionId, nonce) {
  const GAME_SC = "erd1qqqqqqqqqqqqqpgqm77vv5dcqs6kuzhj540vf67f90xemypd0ufsygvnvk";
  async function scQ(funcName) {
    try {
      const colHex = Array.from(collectionId).map(c => c.charCodeAt(0).toString(16).padStart(2,'0')).join('');
      const nonceHex = BigInt(nonce).toString(16).padStart(16,'0');
      const r = await fetch(`${MVX_API_FALLBACK}/vm-values/query`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ scAddress: GAME_SC, funcName, args: [colHex, nonceHex] })
      });
      const d = await r.json();
      const b64 = d?.data?.data?.returnData?.[0];
      if (b64 == null) return null;
      if (b64 === '') return 0n;
      const hex = atob(b64).split('').map(c => c.charCodeAt(0).toString(16).padStart(2,'0')).join('');
      return hex ? BigInt('0x' + hex) : 0n;
    } catch { return null; }
  }
  const [socketCount, tclCount, tclMax, refinementTs, quality, wave, hasBonus, hasCrystal] = await Promise.all([
    scQ('getSocketCount'), scQ('getTclCount'), scQ('getTclMax'), scQ('getRefinementTimestamp'),
    scQ('getNftQuality'), scQ('getNftWave'), scQ('getHasBonus'), scQ('getHasCrystal')
  ]);
  return {
    sc_socket_count:  socketCount   !== null ? Number(socketCount)  : null,
    sc_tcl_count:     tclCount      !== null ? tclCount.toString()  : null,
    sc_tcl_max:       tclMax        !== null ? tclMax.toString()    : null,
    sc_refinement_ts: refinementTs  !== null ? Number(refinementTs) : null,
    sc_quality:       quality       !== null ? Number(quality)      : null,
    sc_wave:          wave          !== null ? Number(wave)         : null,
    sc_has_bonus:     hasBonus      !== null ? hasBonus > 0n        : null,
    sc_has_crystal:   hasCrystal    !== null ? hasCrystal > 0n      : null,
  };
}

async function showNFTDetails(identifier) {
  let nft = getCache("nftDetails", NFTS_CACHE_TTL.nftDetails, identifier);
  if (!nft) {
    nft = await withNFTRequest(`nftDetails:${identifier}`, async () => {
      // Try server first
      try {
        const resp = await fetch(`${TCL_API}/api/nfts/${identifier}`);
        if (resp.ok) {
          const data = await resp.json();
          writeCache("nftDetails", data, identifier);
          return data;
        }
      } catch (e) { /* fallback */ }
      // Fallback: MultiversX API
      const resp = await fetch(`${MVX_API_FALLBACK}/nfts/${identifier}`);
      const data = await resp.json();
      writeCache("nftDetails", data, identifier);
      return data;
    });
  }

  const modal = document.getElementById("modal");
  const content = document.getElementById("modal-content");

  // atribute
  let attributesHtml = "";
  if (nft.metadata && nft.metadata.attributes) {
    attributesHtml = `<h3>Attributes</h3><div class="attr-list">`;
    nft.metadata.attributes.forEach(attr => {
      let value = attr.value, color = "#fff";
      if (typeof value === "string" && value.trim().startsWith("-")) color = "#ff4d4d";
      else if (typeof value === "string" && value.includes("%")) color = "#2ff6de";
      attributesHtml += `
        <div class="attr-item">

          <span style="color:${color}">${value}</span>

      `;
    });

    || nft.sc_socket_count != null || nft.sc_has_bonus != null;
  if (!hasScData && nft.collection && nft.nonce != null) {

    || nft.sc_socket_count != null || nft.sc_has_bonus != null;

      const maxDisplay = Number(tclMax) / 1e18 / (SC_STORAGE_PRICE * 200);
      const usdVal = tclPriceUSD && maxDisplay > 0
        ? ` ≈ <b style="color:#34d399;">$${(maxDisplay / 2 * tclPriceUSD).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</b>`
        : '';
      scHtml = `
        <div class="sc-storage-full" style="margin-bottom:10px;">
          <span class="k">💾 Storage: ${fmtStorage(tclMax)} TCL${usdVal}</span>
          <div class="storage-bar-wrap" style="height:10px; margin-top:5px;">
            <div class="storage-bar-fill" style="width:${storagePct}%"></div>

function showSection(sec) {
  document.getElementById("section-created").style.display = "none";
  document.getElementById("section-balance").style.display = "none";
  document.getElementById("section-" + sec).style.display = "block";

  if (sec !== "created") {
    document.getElementById("filterBar").style.display = "none";
    document.getElementById("backBtn").style.display = "none";
  }

  if (sec === "created") loadCollections();

  document.querySelectorAll("nav button").forEach(btn => btn.classList.remove("active"));
  const activeBtn = document.querySelector(`nav button[onclick="showSection('${sec}')"]`);
  if (activeBtn) activeBtn.classList.add("active");
}

function globalSearch() {
  const term = document.getElementById("globalSearchBox").value.trim().toLowerCase();
  const container = document.getElementById("collections");
  const grid = document.getElementById("nfts");

  if (!term) {
    // dacă nu există căutare → reafișăm colecțiile
    container.style.display = "grid";
    grid.style.display = "none";
    document.getElementById("collections-hint").style.display = "block";
    return;
  }

  // caută în toate NFT-urile preîncărcate
  let results = [];
  for (const col in allNFTsByCollection) {
    results = results.concat(
      allNFTsByCollection[col].filter(nft =>
        nft.identifier.toLowerCase().includes(term)
      )
    );
  }

  if (results.length > 0) {
    container.style.display = "none";
    grid.style.display = "grid";
    document.getElementById("collections-hint").style.display = "none";
    renderNFTs(results);
  } else {
    grid.innerHTML = `<p style="color:#9ca3af; text-align:center;">⚠️ No NFTs found.</p>`;
  }
}

name = "tcl-ai-chat"
main = "worker.js"
compatibility_date = "2026-05-27"
compatibility_flags = ["global_fetch_strictly_public"]
workers_dev = true

[vars]
SUPABASE_URL = "https://phhzrfzhwwooeqsdztee.supabase.co"
ALLOWED_ORIGIN = "https://axel4ro.github.io"
SOURCE_URLS = "https://axel4ro.github.io/TCLexplorer/,https://axel4ro.github.io/TCLexplorer/weekly_events.json,https://www.thecursedland.com/,https://whitepaper.thecursedland.com/"
GEMINI_MODEL = "gemini-2.0-flash"
RAG_MATCH_COUNT = "5"
RATE_LIMIT_WINDOW_SECONDS = "60"
RATE_LIMIT_MAX = "4"
SYNC_MAX_PAGES_PER_SITE = "8"
SYNC_BATCH_SIZE = "12"
SYNC_MAX_TOTAL_PAGES = "18"
SYNC_MAX_CHUNKS = "300"
SYNC_CHUNK_SIZE = "1400"
SYNC_CHUNK_OVERLAP = "220"
DEBUG_ERRORS = "false"

[secrets]
required = [
  "GEMINI_API_KEY",
  "SUPABASE_SERVICE_ROLE_KEY",
  "SYNC_SECRET"
]

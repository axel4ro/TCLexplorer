name: Refresh TCL Analytics Mirror

on:
  workflow_run:
    workflows:
      - pages-build-deployment
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-tcl-analytics
  cancel-in-progress: false

jobs:
  gate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - name: Decide whether analytics refresh should run
        id: decide
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === "workflow_dispatch") {
              core.info("Manual dispatch detected. Analytics refresh will run.");
              core.setOutput("should_run", "true");
              return;
            }

            const headSha = context.payload.workflow_run.head_sha;
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha
            });

            const message = commit.commit.message || "";
            const shouldRun = message.startsWith("update leaderboard.json");

            core.info(`Triggering commit SHA: ${headSha}`);
            core.info(`Triggering commit message: ${message}`);
            core.setOutput("should_run", shouldRun ? "true" : "false");

  refresh:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Refresh TCL analytics snapshot
        shell: pwsh
        run: ./scripts/update-tcl-analytics.ps1

      - name: Commit updated mirror
        shell: bash
        run: |
          if git diff --quiet -- data/tcl-analytics.json data/tcl-analytics.js; then
            echo "No mirror changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tcl-analytics.json data/tcl-analytics.js
          git commit -m "chore: refresh TCL analytics mirror"
          git push

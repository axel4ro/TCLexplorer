server {
    server_name 107.149.201.71.sslip.io;

    # Supabase-compatible path prefix: strip /rest/v1 before forwarding to PostgREST
    location /rest/v1/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, POST, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, apikey, Content-Type, Prefer' always;
            return 204;
        }
    }

    # Direct PostgREST access
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/107.149.201.71.sslip.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/107.149.201.71.sslip.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = 107.149.201.71.sslip.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name 107.149.201.71.sslip.io;
    return 404; # managed by Certbot
}

# ── api.tclexplorer.com — Node.js TCL API ─────────────────────────────────────
# Cloudflare proxies HTTPS on its side; origin accepts on port 443
# Uses the sslip.io cert (Cloudflare Full mode accepts it — not Strict)
server {
    listen 443 ssl;
    server_name api.tclexplorer.com;

    ssl_certificate /etc/letsencrypt/live/107.149.201.71.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/107.149.201.71.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}

# Redirect HTTP -> HTTPS for api.tclexplorer.com
server {
    listen 80;
    server_name api.tclexplorer.com;
    return 301 https://$host$request_uri;
}

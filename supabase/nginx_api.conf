# api.tclexplorer.com — routes to Node.js TCL API on port 4000
# Cloudflare handles SSL on the browser side (orange cloud proxy)
# This server accepts HTTP from Cloudflare's edge (Flexible SSL mode)

server {
    listen 80;
    server_name api.tclexplorer.com;

    # Allow only Cloudflare IP ranges (security)
    # Cloudflare IPv4 ranges — updated automatically via cfupdate cron
    include /etc/nginx/cloudflare_ips.conf;
    deny all;

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}
